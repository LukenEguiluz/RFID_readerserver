# Escuchar en todas las interfaces del contenedor (acceso vía IP VPN/LAN del host).
server:
  address: 0.0.0.0
  port: 8080

spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  datasource:
    # connectTimeout/socketTimeout en segundos (driver pg). tcpKeepAlive ayuda tras NAT/VPN.
    url: "jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:rfidgateway}?connectTimeout=30&socketTimeout=180&tcpKeepAlive=true"
    username: ${DB_USER:rfiduser}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 2
      connection-timeout: 60000
      validation-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1700000
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

# Opcional: filtrar lecturas con señal débil. Ej: -70 para ignorar tags con RSSI < -70 dBm
# rfid:
#   rssi-min-dbm: -70
# Tiempo máximo de lectura (min); 0 = sin auto-stop
#   reading-timeout-minutes: 2

logging:
  level:
    root: WARN
    com.rfidgateway: INFO







