<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="dhHead (pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' · doHealth RFID'">doHealth RFID</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script th:src="@{/js/tailwind-dohealth-config.js}"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&amp;display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: Inter, system-ui, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #e3e2e2; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #926e6c; border-radius: 4px; }
        .dh-modal-overlay { position: fixed; inset: 0; background: rgba(26,28,28,0.45); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
        .dh-modal-overlay.dh-open { display: flex; }
        .dh-modal-box { background: #fff; border-radius: 0.5rem; max-width: 720px; width: 100%; max-height: 85vh; overflow: auto; border: 1px solid #e7bdb9; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
    </style>
</th:block>
</html>
