<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Sidebar: th:replace="~{fragments/dh-nav :: dhSidebar(activeNav='readers')}" -->
<aside th:fragment="dhSidebar (activeNav)"
       class="fixed left-0 top-0 z-50 flex h-full w-[260px] flex-col gap-sm border-r border-outline-variant bg-on-secondary-fixed-variant py-xl px-md dark:border-outline dark:bg-inverse-surface">
    <div class="mb-xl px-4">
        <a th:href="@{/}" class="block">
            <h1 class="font-title-md text-title-md font-bold text-surface-bright">doHealth</h1>
            <p class="text-[10px] uppercase tracking-widest text-secondary-fixed-dim">RFID Control Center</p>
        </a>
    </div>
    <nav class="flex flex-col gap-xs">
        <a th:href="@{/}"
           class="flex items-center gap-md rounded-lg px-4 py-3 font-label-md text-label-md transition-all"
           th:classappend="${activeNav == 'home'} ? ' bg-primary-container font-bold text-on-primary-container ' : ' text-secondary-fixed-dim hover:bg-on-secondary-fixed hover:text-surface-bright '">
            <span class="material-symbols-outlined text-[22px]">dashboard</span>
            <span>Inicio</span>
        </a>
        <a th:href="@{/readers}"
           class="flex items-center gap-md rounded-lg px-4 py-3 font-label-md text-label-md transition-all"
           th:classappend="${activeNav == 'readers'} ? ' bg-primary-container font-bold text-on-primary-container ' : ' text-secondary-fixed-dim hover:bg-on-secondary-fixed hover:text-surface-bright '">
            <span class="material-symbols-outlined text-[22px]">sensors</span>
            <span>Lectores</span>
        </a>
        <a th:href="@{/tags}"
           class="flex items-center gap-md rounded-lg px-4 py-3 font-label-md text-label-md transition-all"
           th:classappend="${activeNav == 'tags'} ? ' bg-primary-container font-bold text-on-primary-container ' : ' text-secondary-fixed-dim hover:bg-on-secondary-fixed hover:text-surface-bright '">
            <span class="material-symbols-outlined text-[22px]">label</span>
            <span>Tags en vivo</span>
        </a>
        <a th:href="@{/groups}"
           class="flex items-center gap-md rounded-lg px-4 py-3 font-label-md text-label-md transition-all"
           th:classappend="${activeNav == 'groups'} ? ' bg-primary-container font-bold text-on-primary-container ' : ' text-secondary-fixed-dim hover:bg-on-secondary-fixed hover:text-surface-bright '">
            <span class="material-symbols-outlined text-[22px]">group</span>
            <span>Grupos</span>
        </a>
        <a th:href="@{/inventory-systems}"
           class="flex items-center gap-md rounded-lg px-4 py-3 font-label-md text-label-md transition-all"
           th:classappend="${activeNav == 'inventory'} ? ' bg-primary-container font-bold text-on-primary-container ' : ' text-secondary-fixed-dim hover:bg-on-secondary-fixed hover:text-surface-bright '">
            <span class="material-symbols-outlined text-[22px]">inventory_2</span>
            <span>Inventario continuo</span>
        </a>
        <a th:href="@{/api-docs}"
           class="flex items-center gap-md rounded-lg px-4 py-3 font-label-md text-label-md transition-all"
           th:classappend="${activeNav == 'api'} ? ' bg-primary-container font-bold text-on-primary-container ' : ' text-secondary-fixed-dim hover:bg-on-secondary-fixed hover:text-surface-bright '">
            <span class="material-symbols-outlined text-[22px]">menu_book</span>
            <span>APIs</span>
        </a>
    </nav>
    <div class="mt-auto border-t border-white/10 px-4 py-4">
        <div class="flex items-center gap-sm">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-secondary-container text-on-secondary-container">
                <span class="material-symbols-outlined text-[20px]">hub</span>
            </div>
            <div class="flex flex-col">
                <span class="text-[12px] font-bold text-surface-bright">RFID Gateway</span>
                <a th:href="@{/api/health}" class="text-[10px] text-secondary-fixed-dim hover:text-primary-container" target="_blank" rel="noopener">Salud / estado →</a>
            </div>
        </div>
    </div>
</aside>

<!-- Top bar: th:replace="~{fragments/dh-nav :: dhTopbar('Título')}" -->
<header th:fragment="dhTopbar (pageTitle)"
        class="sticky top-0 z-40 flex h-16 w-full shrink-0 items-center justify-between border-b border-outline-variant bg-surface px-margin-desktop dark:border-outline dark:bg-surface-dim">
    <div class="flex min-w-0 flex-1 items-center gap-lg">
        <h2 class="truncate font-headline-md text-headline-md font-bold text-primary dark:text-primary-container"
            th:text="${pageTitle}">Título</h2>
    </div>
    <div class="flex items-center gap-sm">
        <a th:href="@{/api/status}" target="_blank" rel="noopener"
           class="hidden rounded-full border border-outline-variant/40 bg-surface-container-low px-md py-xs text-label-md font-label-md text-on-surface hover:bg-surface-container-high sm:inline-flex sm:items-center sm:gap-sm">
            <span class="material-symbols-outlined text-[18px] text-on-surface-variant">monitoring</span>
            API estado
        </a>
    </div>
</header>
</html>
