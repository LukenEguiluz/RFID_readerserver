<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" class="light"
      th:with="pageTitle=|EPC — ${systemName}|">
<head th:replace="~{fragments/dh-head :: dhHead(${pageTitle})}"></head>
<body class="min-h-screen bg-background text-on-background">
<aside th:replace="~{fragments/dh-nav :: dhSidebar(activeNav='inventory')}"></aside>
<main class="ml-[260px] flex min-h-screen flex-col bg-background">
    <header th:replace="~{fragments/dh-nav :: dhTopbar(${pageTitle})}"></header>
    <div class="custom-scrollbar flex-1 space-y-lg overflow-y-auto p-margin-desktop max-w-max-width">
        <div class="flex flex-wrap gap-sm">
            <a th:href="@{/inventory-systems}" class="inline-flex items-center gap-xs rounded-lg border border-outline-variant bg-surface-container-lowest px-md py-sm text-label-md text-on-surface hover:bg-surface-container-low">Lista sistemas</a>
            <a th:href="@{/inventory-systems/{id}/edit(id=${systemId})}" class="inline-flex items-center gap-xs rounded-lg border border-primary/30 bg-primary-container/10 px-md py-sm text-label-md font-bold text-primary hover:bg-primary-container/20">Editar sistema</a>
        </div>
        <div class="rounded-xl border border-outline-variant bg-surface-container-lowest p-lg shadow-sm">
            <p class="text-body-md text-on-surface"><strong th:text="${systemName}">Sistema</strong> · <code class="rounded bg-surface-container-high px-1 font-code-md text-code-md text-primary" th:text="${systemId}">id</code></p>
            <p class="mt-sm text-body-md text-on-surface-variant">EPC <em>presentes</em> en el ciclo. Actualización cada 2 s.</p>
            <div id="status" class="mt-md text-label-md text-on-surface-variant">Cargando…</div>
            <div id="err" class="mt-sm hidden text-body-md text-error"></div>
            <div class="mt-md overflow-x-auto rounded-lg border border-outline-variant">
                <table class="w-full min-w-[640px] border-collapse text-left text-body-md">
                    <thead>
                    <tr class="border-b border-outline-variant bg-surface-container-low">
                        <th class="px-md py-sm font-label-md text-label-md uppercase text-on-surface-variant">EPC</th>
                        <th class="px-md py-sm font-label-md text-label-md uppercase text-on-surface-variant">Última vez</th>
                        <th class="px-md py-sm font-label-md text-label-md uppercase text-on-surface-variant">Lector</th>
                        <th class="px-md py-sm font-label-md text-label-md uppercase text-on-surface-variant">Antena</th>
                    </tr>
                    </thead>
                    <tbody id="rows" class="divide-y divide-outline-variant"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script th:inline="javascript">
(function () {
    var systemId = /*[[${systemId}]]*/ '';
    var api = '/api/inventory-systems/' + encodeURIComponent(systemId) + '/epcs/current';
    var statusEl = document.getElementById('status');
    var errEl = document.getElementById('err');
    var tbody = document.getElementById('rows');

    function esc(s) {
        if (s == null) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function tick() {
        fetch(api, { credentials: 'same-origin' })
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (list) {
                errEl.classList.add('hidden');
                statusEl.textContent = 'Última actualización: ' + new Date().toLocaleTimeString() + ' · ' + list.length + ' EPC';
                tbody.innerHTML = '';
                list.forEach(function (row) {
                    var tr = document.createElement('tr');
                    tr.className = 'hover:bg-surface-container-low';
                    tr.innerHTML =
                        '<td class="px-md py-sm"><code class="rounded bg-surface-container-high px-1 font-code-md text-code-md text-primary">' + esc(row.epc) + '</code></td>' +
                        '<td class="px-md py-sm text-on-surface-variant">' + esc(row.lastSeenAt) + '</td>' +
                        '<td class="px-md py-sm">' + esc(row.lastReaderId) + '</td>' +
                        '<td class="px-md py-sm">' + esc(row.lastAntennaPort) + '</td>';
                    tbody.appendChild(tr);
                });
            })
            .catch(function (e) {
                errEl.classList.remove('hidden');
                errEl.textContent = 'Error al cargar EPC: ' + e.message;
                statusEl.textContent = 'Sin datos';
            });
    }
    tick();
    setInterval(tick, 2000);
})();
</script>
</body>
</html>
